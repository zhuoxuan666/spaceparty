<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>吴迪炸炸乐</title>

<style>
body {
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(#f5f7fa, #e8ebf0);
    padding: 40px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
}

.name {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
}

.badge {
    display: inline-block;
    margin-left: 6px;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 14px;
    background: #4facfe;
    color: #fff;
}

.info {
    margin-top: 30px;
    text-align: left;
    font-size: 15px;
    line-height: 2;
}

.label {
    color: #888;
}

.back {
    display: inline-block;
    margin-top: 30px;
    padding: 10px 24px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: #fff;
    border-radius: 24px;
    text-decoration: none;
}
</style>
</head>

<body>
<div class="container" id="app">
    加载中...
</div>

<script>
const app = document.getElementById("app");

/* ✅ JSON 地址 */
const JSON_URL = "https://zhuoxuan666.github.io/spaceparty/exm.json";
const TARGET_QQ = "2190294975";

fetch(JSON_URL)
.then(res => res.json())
.then(list => {
    const m = list.find(x => x.qq === TARGET_QQ);
    if (!m) {
        app.innerHTML = "未找到成员";
        return;
    }

    app.innerHTML = `
        <img class="avatar" src="${m.avatar_url}">
        <div class="name">
            ${m.nickname}
            <span class="badge">管理</span>
            ${m.is_vip ? `<span style="color:gold;margin-left:6px;">👑VIP${m.vip_level}</span>` : ''}
        </div>

        <div class="info">
            <p><span class="label">QQ：</span>${m.qq}</p>
            <p><span class="label">等级：</span>${m.qq_level}</p>
            <p><span class="label">性别：</span>${m.sex}</p>
            <p><span class="label">年龄：</span>${m.age}</p>
        </div>

        <a class="back" href="index.html">← 返回列表</a>
    `;
})
.catch(() => {
    app.innerHTML = "数据加载失败";
});
</script>
</body>
</html>
