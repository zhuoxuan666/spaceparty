<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人履历详情</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    max-width: 900px;
    width: 100%;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 顶部信息栏 */
.profile-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 40px 30px;
    display: flex;
    align-items: center;
    gap: 30px;
    position: relative;
}

.avatar-container {
    position: relative;
}

.avatar {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 6px solid rgba(255,255,255,0.3);
    object-fit: cover;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

.avatar:hover {
    transform: scale(1.05);
}

.user-basic {
    flex: 1;
}

.user-name {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 8px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.user-id {
    font-size: 18px;
    opacity: 0.9;
    margin-bottom: 15px;
}

.user-tags {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.tag {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
}

/* 内容区 */
.profile-content {
    padding: 40px;
}

.section {
    margin-bottom: 40px;
    border-left: 4px solid #667eea;
    padding-left: 20px;
}

.section-title {
    font-size: 24px;
    color: #2d3748;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-content {
    font-size: 16px;
    line-height: 1.8;
    color: #4a5568;
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    border-left: 4px solid #e2e8f0;
}

/* 社交链接 */
.social-links {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
}

.social-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(102, 126, 234, 0.2);
}

.social-link:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 12px rgba(102, 126, 234, 0.3);
}

/* 返回按钮 */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 20px;
    text-decoration: none;
}

.back-btn:hover {
    background: #5a6fd8;
}

/* 错误和加载状态 */
.loading, .error, .not-found {
    text-align: center;
    padding: 60px 20px;
    color: #4a5568;
    font-size: 18px;
}

.error {
    color: #e53e3e;
    background: #fff5f5;
    border-radius: 12px;
    border: 2px dashed #fc8181;
    margin: 20px;
}

.not-found {
    color: #718096;
    background: #f7fafc;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    margin: 20px;
}

.refresh-btn {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.3s;
}

.refresh-btn:hover {
    background: #5a6fd8;
}

/* 时间线样式（用于历史经历） */
.timeline {
    position: relative;
    padding-left: 20px;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #667eea;
    border-radius: 2px;
}

.timeline-item {
    position: relative;
    margin-bottom: 20px;
    padding-left: 20px;
}

.timeline-item::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 6px;
    width: 12px;
    height: 12px;
    background: #667eea;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
}

.timeline-item:last-child {
    margin-bottom: 0;
}

/* 响应式 */
@media (max-width: 768px) {
    .profile-header {
        flex-direction: column;
        text-align: center;
        padding: 30px 20px;
    }
    
    .user-tags {
        justify-content: center;
    }
    
    .profile-content {
        padding: 20px;
    }
    
    .avatar {
        width: 120px;
        height: 120px;
    }
    
    .user-name {
        font-size: 28px;
    }
}
</style>
</head>

<body>
<div class="container">
    <div id="content" class="loading">
        正在加载成员信息...
    </div>
</div>

<script>
// 获取URL中的QQ参数
function getQQFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('qq');
}

// 格式化时间线
function formatTimeline(text) {
    if (!text) return '<p>暂无历史经历</p>';
    
    // 尝试按段落分割
    const paragraphs = text.split('\n').filter(p => p.trim());
    
    if (paragraphs.length <= 1) {
        return `<p>${text}</p>`;
    }
    
    return `
        <div class="timeline">
            ${paragraphs.map(p => `
                <div class="timeline-item">
                    <p>${p}</p>
                </div>
            `).join('')}
        </div>
    `;
}

// 加载并显示成员信息
async function loadMemberProfile() {
    const contentEl = document.getElementById('content');
    const targetQQ = getQQFromURL();
    
    if (!targetQQ) {
        contentEl.innerHTML = `
            <div class="error">
                <h2>❌ 缺少参数</h2>
                <p>请通过URL参数指定QQ号，例如：<br>
                <code>?qq=3408367085</code></p>
                <a href="javascript:history.back()" class="refresh-btn">返回上一页</a>
            </div>
        `;
        return;
    }
    
    try {
        const response = await fetch('https://zhuoxuan666.github.io/spaceparty/mem.json');
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: 无法加载 mem.json`);
        }
        
        const data = await response.json();
        
        // 查找目标用户
        const member = data.find(m => m.qq === targetQQ);
        
        if (!member) {
            contentEl.innerHTML = `
                <div class="not-found">
                    <h2>😔 未找到用户</h2>
                    <p>找不到QQ号为 <strong>${targetQQ}</strong> 的成员。</p>
                    <p>文件中共有 ${data.length} 条记录，可用的QQ号有：</p>
                    <p style="font-size: 14px; color: #666; margin-top: 10px;">${data.slice(0, 10).map(m => m.qq).join(', ')}${data.length > 10 ? '...' : ''}</p>
                    <a href="javascript:history.back()" class="refresh-btn">返回上一页</a>
                </div>
            `;
            return;
        }
        
        // 渲染用户详情
        renderMemberProfile(member, data);
        
    } catch (error) {
        console.error('加载失败:', error);
        contentEl.innerHTML = `
            <div class="error">
                <h2>❌ 数据加载失败</h2>
                <p>错误信息: ${error.message}</p>
                <button onclick="loadMemberProfile()" class="refresh-btn">重试</button>
            </div>
        `;
    }
}

// 渲染用户详情页
function renderMemberProfile(member, allData) {
    // 处理社交链接
    let socialLinksHTML = '';
    for (let i = 1; i <= 10; i++) {
        const name = member[`web${i}name`];
        const url = member[`url${i}`];
        if (name && url) {
            // 添加图标
            let icon = '🔗';
            if (name.includes('推特') || name.includes('X') || name.includes('twitter')) icon = '🐦';
            else if (name.includes('电报') || name.includes('telegram')) icon = '✈️';
            else if (name.includes('QQ')) icon = '🐧';
            else if (name.includes('微信')) icon = '💬';
            else if (name.includes('微博')) icon = '📱';
            
            socialLinksHTML += `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="social-link">
                    ${icon} ${name}
                </a>
            `;
        }
    }
    
    // 性别图标
    const genderIcon = member.sex === 'male' ? '👨' : member.sex === 'female' ? '👩' : '👤';
    
    const contentEl = document.getElementById('content');
    contentEl.innerHTML = `
        <div class="profile-header">
            <div class="avatar-container">
                <img src="${member.avatar_url || 'https://via.placeholder.com/150?text=No+Avatar'}" 
                     alt="${member.nickname}" 
                     class="avatar"
                     onerror="this.src='https://via.placeholder.com/150?text=头像加载失败'">
            </div>
            
            <div class="user-basic">
                <h1 class="user-name">${member.nickname}</h1>
                <div class="user-id">QQ: ${member.qq}</div>
                
                <div class="user-tags">
                    <div class="tag">${genderIcon} ${member.sex === 'male' ? '男' : member.sex === 'female' ? '女' : '未知'}</div>
                    <div class="tag">🎂 ${member.age || '??'} 岁</div>
                    ${member.is_vip ? `<div class="tag" style="background: linear-gradient(135deg, gold, orange);">👑 VIP${member.vip_level || ''}</div>` : ''}
                </div>
            </div>
        </div>
        
        <div class="profile-content">
            ${member.history ? `
            <div class="section">
                <h2 class="section-title">📜 历史经历</h2>
                <div class="section-content">
                    ${formatTimeline(member.history)}
                </div>
            </div>
            ` : ''}
            
            ${member.achieve ? `
            <div class="section">
                <h2 class="section-title">🏆 成就与奖项</h2>
                <div class="section-content">
                    ${member.achieve}
                </div>
            </div>
            ` : ''}
            
            ${member.long_nick ? `
            <div class="section">
                <h2 class="section-title">💬 个人签名</h2>
                <div class="section-content">
                    ${member.long_nick}
                </div>
            </div>
            ` : ''}
            
            ${member.location || member.email ? `
            <div class="section">
                <h2 class="section-title">📍 联系方式</h2>
                <div class="section-content">
                    ${member.location ? `<p><strong>地区：</strong>${member.location}</p>` : ''}
                    ${member.email ? `<p><strong>邮箱：</strong>${member.email}</p>` : ''}
                </div>
            </div>
            ` : ''}
            
            ${socialLinksHTML ? `
            <div class="section">
                <h2 class="section-title">🔗 社交链接</h2>
                <div class="section-content">
                    <div class="social-links">
                        ${socialLinksHTML}
                    </div>
                </div>
            </div>
            ` : ''}
            
            ${member.reg_time || member.last_updated ? `
            <div class="section">
                <h2 class="section-title">📅 时间信息</h2>
                <div class="section-content">
                    ${member.reg_time ? `<p><strong>注册时间：</strong>${new Date(member.reg_time).toLocaleString('zh-CN')}</p>` : ''}
                    ${member.last_updated ? `<p><strong>最近更新：</strong>${new Date(member.last_updated).toLocaleString('zh-CN')}</p>` : ''}
                </div>
            </div>
            ` : ''}
            
            <a href="index.html" class="back-btn">← 返回成员列表</a>
        </div>
    `;
}

// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', loadMemberProfile);
</script>
</body>
</html>
