<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");
let cards = [];

fetch("exm.json")
.then(res => res.json())
.then(list => {
    list.forEach(m => {
        const role = m.qq === "3408367085" ? "群主" : "成员";

        const card = document.createElement("div");
        card.className = "member-card";
        card.dataset.qq = m.qq;
        card.dataset.name = m.nickname;

        card.innerHTML = `
            <img class="avatar" src="${m.avatar_url}">
            <div class="name ${role === '群主' ? 'owner' : ''}">
                ${m.nickname}
                <span class="badge ${role === '群主' ? 'owner' : 'manager'}">
                    ${role}
                </span>
                ${m.is_vip ? '<span style="color:#ffd700;margin-left:4px;">👑VIP' + m.vip_level + '</span>' : ''}
            </div>
            <div class="desc">${m.long_nick || "暂无签名"}</div>
            <div class="qq">QQ：${m.qq}</div>
            <div class="qq">等级：${m.qq_level} · ${m.sex}</div>
            <a class="detail-btn" href="detail_${m.qq}.html">查看详情</a>
        `;

        grid.appendChild(card);
        cards.push(card);
    });
});

/* 搜索 */
search.addEventListener("input", () => {
    const v = search.value.trim().toLowerCase();
    cards.forEach(card => {
        card.style.display =
            card.dataset.name.toLowerCase().includes(v) ||
            card.dataset.qq.includes(v)
            ? "" : "none";
    });
});
</script>
